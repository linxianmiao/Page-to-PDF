<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Page2PDF 网页转 PDF</title>
<style>
  :root {
    --bg: #0e1013;
    --bg-elev: #161a1f;
    --bg-input: #1c2128;
    --border: #262c35;
    --border-strong: #38404c;
    --text: #e6e8eb;
    --text-dim: #8b93a1;
    --text-faint: #5a6372;
    --accent: #f5a524;
    --accent-soft: #f5a52420;
    --danger: #ef4444;
    --ok: #22c55e;
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    width: 300px;
    padding: 16px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 13px;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .version {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .hint strong { color: var(--accent); font-weight: 600; }

  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #1a1106;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: filter 0.1s;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn .arrow { font-family: var(--mono); }

  .status {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    min-height: 16px;
  }
  .status.err { color: var(--danger); }
  .status.ok { color: var(--ok); }
</style>
</head>
<body>

<div class="header">
  <div class="brand"><span class="dot"></span>Page2PDF</div>
  <span class="version">v2.0</span>
</div>

<div class="hint">
  点下方按钮后,页面顶部会出现一条<strong>滚动截图</strong>工具条。按提示滚到起点、
  终点,完成后会打开编辑器让你画分割线。
</div>

<button class="btn" id="start">
  <span>开始滚动截图</span>
  <span class="arrow">→</span>
</button>

<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
